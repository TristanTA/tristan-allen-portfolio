title: "Tristan Allen"
description: "Applied AI/ML engineering portfolio"
url: "https://tristanta.github.io"
baseurl: "/tristan-allen-portfolio"

remote_theme: "mmistakes/minimal-mistakes@4.24.0"

plugins:
  - jekyll-include-cache

minimal_mistakes_skin: "default"

markdown: kramdown
permalink: /:title/

defaults:
  - scope:
      path: ""
    values:
      layout: single
      classes: wide
      author_profile: false
      toc: false

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/TristanTA"

sass:
  style: compressed
